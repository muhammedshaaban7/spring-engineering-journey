version: '3.8'

services:

  # PostgreSQL Database
  db:
    image: postgres:16
    container_name: demo-db
    environment:
      POSTGRES_DB: SpringDemo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5433:5432"  # 5433 عشان مش يتعارض مع الـ PostgreSQL المحلي
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: demo-redis
    ports:
      - "6379:6379"

  # Spring Boot App
  app:
    build: .
    container_name: demo-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/SpringDemo
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
    depends_on:
      - db  # بيستنى الـ Database تشتغل الأول
      - redis  # بيستنى الـ Redis تشتغل الأول
volumes:
  postgres_data: